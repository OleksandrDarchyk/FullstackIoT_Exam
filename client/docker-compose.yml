services:
  depcruise:
    build:
      context: .
      dockerfile_inline: |
        FROM node:20-alpine
        RUN apk add --no-cache graphviz
        WORKDIR /app
        COPY package.json package-lock.json* ./
        RUN npm ci && npm install --no-save dependency-cruiser
        COPY . .
        CMD ["sh", "-c", "./node_modules/.bin/depcruise --no-config --ts-config tsconfig.app.json src --include-only '^src' --output-type dot | dot -T svg > /output/dependency-graph.svg && echo 'Dependency graph generated successfully at dependency-graph.svg'"]
    volumes:
      - ./:/output
